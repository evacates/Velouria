name: dosey
description: "A cozy medication companion for reminders, refills, and adherence."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.5.3
  flutter_riverpod: ^3.2.1
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  intl: ^0.20.2
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  http: ^1.5.0
  flutter_timezone: ^4.1.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
